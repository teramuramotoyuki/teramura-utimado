<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>内窓 現場調査票</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;font-size:11px;background:#f0f0f0;padding:8px;}
.page-wrap{background:white;width:100%;max-width:800px;margin:0 auto;padding:10px;border:1px solid #999;}
.screen-nav{display:flex;gap:0;margin-bottom:8px;border:1px solid #666;width:100%;}
.nav-btn{flex:1;padding:8px 4px;text-align:center;font-size:12px;font-weight:bold;cursor:pointer;border:none;background:#e8e8e8;color:#333;border-right:1px solid #666;}
.nav-btn:last-child{border-right:none;}
.nav-btn.active{background:#1a1a1a;color:white;}
.screen{display:none;}
.screen.active{display:block;}

/* ===== 表書き ===== */
table.form-tbl{width:100%;border-collapse:collapse;font-size:11px;}
table.form-tbl td,table.form-tbl th{border:1px solid #333;padding:2px 4px;vertical-align:middle;}
.lbl{background:#f5f5f5;font-weight:bold;white-space:nowrap;text-align:center;}
.lbl-lg{font-size:13px;font-weight:bold;text-align:center;background:#f5f5f5;}
input[type=text],input[type=date],input[type=tel],input[type=number],select,textarea{
  font-family:inherit;font-size:11px;border:none;outline:none;background:transparent;width:100%;padding:1px 2px;color:#111;
}
.radio-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:11px;}
.radio-row label{display:flex;align-items:center;gap:2px;cursor:pointer;white-space:nowrap;}
.check-opt{display:flex;align-items:center;gap:2px;cursor:pointer;}
.grid-area{width:100%;border-top:1px solid #ccc;}
.grid-row{display:flex;}
.grid-cell{border-right:1px solid #ccc;border-bottom:1px solid #ccc;height:18px;flex:1;}

/* ===== 採寸票 ===== */
.saisun-wrap{font-size:11px;}
.window-selector{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;align-items:center;}
.aw-btn{padding:4px 10px;border:1px solid #666;background:#e8e8e8;cursor:pointer;font-size:11px;font-weight:bold;}
.aw-btn.active{background:#1a1a1a;color:white;}
.add-aw-btn{padding:4px 10px;border:1px dashed #666;background:white;cursor:pointer;font-size:11px;color:#333;}
.del-aw-btn{padding:4px 8px;border:1px solid #c00;background:white;cursor:pointer;font-size:11px;color:#c00;margin-left:auto;}

table.s-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:4px;}
table.s-tbl td{border:1px solid #333;padding:2px 3px;vertical-align:middle;}
.s-lbl{background:#f0f0f0;font-weight:bold;white-space:nowrap;text-align:center;}
.dims-section{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid #333;}
.dims-left{border-right:1px solid #333;padding:4px;}
.dims-right{padding:4px;}
.dim-row{display:flex;align-items:center;gap:4px;margin-bottom:3px;font-size:11px;}
.dim-row label{min-width:38px;font-weight:bold;}
.dim-row input{border-bottom:1px solid #666;width:70px;text-align:right;background:transparent;font-family:inherit;font-size:11px;outline:none;}
.dim-row span{font-size:10px;color:#555;}
.result-box{background:#e8f4e8;border:1px solid #5a9;padding:3px 6px;margin-top:4px;font-size:11px;}
.result-box .res-row{display:flex;justify-content:space-between;font-weight:bold;}
.note-box{background:#fff8e0;border:1px solid #ca0;padding:2px 4px;font-size:10px;margin:2px 0;}

/* クレセント図 */
.crescent-area{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid #333;margin-top:4px;}
.crescent-inputs{border-right:1px solid #333;padding:4px;}
.crescent-diagram{padding:4px;display:flex;align-items:center;justify-content:center;}
.c-row{display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.c-row label{min-width:22px;font-size:11px;font-weight:bold;font-style:italic;}
.c-row input{border-bottom:1px solid #666;width:60px;text-align:right;background:transparent;font-family:inherit;font-size:11px;outline:none;}

/* 付帯情報 */
.fuka-table{width:100%;border-collapse:collapse;margin-top:4px;}
.fuka-table td{border:1px solid #333;padding:2px 4px;font-size:11px;vertical-align:middle;}
.fuka-lbl{background:#f0f0f0;font-weight:bold;white-space:nowrap;text-align:center;width:80px;}

/* 集計 */
.summary-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;}
.summary-table th{background:#1a1a1a;color:white;padding:4px 6px;text-align:center;border:1px solid #333;}
.summary-table td{border:1px solid #333;padding:3px 6px;vertical-align:middle;}
.summary-table tr:nth-child(even) td{background:#f8f8f8;}
.warn-cell{color:#c00;font-weight:bold;}

.action-row{display:flex;gap:8px;margin-top:12px;}
.btn-primary{flex:1;padding:10px;background:#1a7a4a;color:white;border:none;cursor:pointer;font-size:13px;font-weight:bold;}
.btn-secondary{flex:1;padding:10px;background:#555;color:white;border:none;cursor:pointer;font-size:13px;}
</style>
</head>
<body>

<div class="page-wrap">

          <div class="radio-row">

            <label><input type="radio" name="hensei" value="アイボリー"> アイボリー</label>

            <label><input type="radio" name="hensei" value="ダークブラウン"> ダークブラウン</label>
            <label><input type="radio" name="hensei" value="ブラック"> ブラック</label>
            <label><input type="radio" name="hensei" value="支給品"> 支給品</label>
          </div>
        </td>
      </tr>
      <tr>
        <td></td>
        <td colspan="2"></td>
        <td class="lbl" style="font-size:10px;">シリコン<br>シール色</td>
        <td colspan="4" style="font-size:10px;">
          <div class="radio-row">
            <label><input type="radio" name="silicon" value="防カビ"> 防カビ</label>
            <label><input type="radio" name="silicon" value="ホワイト"> ホワイト</label>
            <label><input type="radio" name="silicon" value="ライトグレー"> ライトグレー</label>
            <label><input type="radio" name="silicon" value="ライトブラウン"> ライトブラウン</label>
            <label><input type="radio" name="silicon" value="ブラウン"> ブラウン</label>
            <label><input type="radio" name="silicon" value="ダークブラウン"> ダークブラウン</label>
            <label><input type="radio" name="silicon" value="ブラック"> ブラック</label>
            <label><input type="radio" name="silicon" value="支給品"> 支給品</label>
          </div>
        </td>
      </tr>
      <tr>
        <td class="lbl">セコム</td>
        <td>

            <label><input type="radio" name="iromihon" value="済"> 済</label>
            <label><input type="radio" name="iromihon" value="カタログのみ"> カタログのみ</label>
          </div>
        </td>
        <td class="lbl" style="font-size:10px;">ガラス<br>特徴説明</td>
        <td>
          <div class="radio-row" style="flex-direction:column;gap:2px;">
            <label><input type="radio" name="garasuSetsu" value="済"> 済</label>
            <label><input type="radio" name="garasuSetsu" value="熱割れ"> 熱割れ</label>

      <tr>

          施工時カーテン　カーテン金物破損

        <td class="lbl">説明</td>
        <td>

    <div style="border:1px solid #333;border-top:none;padding:3px 4px;font-weight:bold;font-size:12px;background:#f5f5f5;">間取り・注意点</div>
    <div style="border:1px solid #333;border-top:none;">
      <div id="maNotice" style="min-height:200px;padding:4px;">
        <textarea id="madoriText" style="width:100%;min-height:180px;border:none;outline:none;font-size:11px;font-family:inherit;resize:vertical;" placeholder="1Fから時計回りでAW1・AW2…と窓番号を記入&#10;注意点・特記事項など自由記入"></textarea>
      </div>
      <!-- グリッド背景的なライン -->
      <div style="border-top:1px solid #ddd;display:grid;grid-template-columns:repeat(20,1fr);">

        </script>

    <div class="action-row" style="margin-top:8px;">

  <!-- ===== 採寸票 ===== -->

    <div class="window-selector" id="awSelector">

      <button class="del-aw-btn" onclick="delAW()">AW削除</button>

      <button class="btn-primary" onclick="exportData()">見積・工程連携へ →</button>

<script>
const MAKERS = ['インプラス','ウチリモ'];
const TYPES = ['2枚引違','4枚引違','FIX','開き窓'];

// インプラス色：ホワイトは2025年12月末販売終了予定のため末尾に注記
const COLORS = {
  'インプラス': [
    'ニュートラルウッドG',
    'アンバーグレイン',
    'シルバー',
    'ブラック',
    'プレシャスホワイト',
    'ホワイト（2025年12月末終了予定）',
  ],
  'ウチリモ': [
    'ホワイト',
    'グレイジュ',
    'カームブラック',
    'クリア',
    'ナチュラル',
    'ミディアムオーク',
    'ダークブラウン',
  ],
};

const GLASSES = {
  'インプラス': [
    '透明3mm（単板）',
    '透明5mm（単板）',
    '型4mm（単板）',
    '複層ガラス（透明）',
    '複層ガラス（型）',
    'Low-E複層（断熱・透明）',
    'Low-E複層（断熱・型）',
    'Low-E複層（遮熱・透明）',
    'Low-E複層（遮熱・型）',
    'Low-E複層（アルゴンガス入り・断熱）',
    '防音合わせガラス',
    '和紙調3mm',
    '和紙調3mm格子入り',
    '和紙調5mm',
    '和紙調5mm格子入り',
    '和紙調複層',
  ],
  'ウチリモ': [
    '透明4mm（単板）',
    '型4mm（単板）',
    '複層ガラス（透明）',
    '複層ガラス（型）',
    'Low-E複層（断熱・透明）ニュートラル',
    'Low-E複層（断熱・型）',
    'Low-E複層（遮熱・透明）',
    'Low-E複層（断熱・アルゴンガス入り）',
    '和紙調格子入り',
  ],
};

// ふかし枠（メーカー別）
const FUKAMI_OPTS = {
  'インプラス': ['なし','20mm（4方）','20mm（3方）','40mm（4方）','40mm（3方）','50mm（4方）','50mm（3方）','70mm（4方）','補強一体50mm（小）','補強一体50mm（大）','補強一体70mm（大）'],
  'ウチリモ':   ['なし','25mm（4方）','25mm（3方）','40mm（4方）','40mm（3方）'],
};

const CRESCENT_OPT = ['そのまま','クレセント交換（短）','内窓クレセント 100mm上げる','内窓クレセント 100mm下げる'];

let awList = [];
let awCount = 0;
let currentAW = null;

function addAW() {
  awCount++;
  let id = 'AW' + awCount;
  awList.push({
    id, maker:'インプラス', type:'2枚引違', color:'', glass:'',
    floor:'1', ashiba:'脚立（内）',
    wu:'',wm:'',wd:'',hl:'',hm:'',hr:'',ch:'',
    handaiW:'',handaiH:'',handaiCH:'',
    fukami:'',hensin:false,
    tukuri:'手前付', taikaku:'内',
    a:'',b:'',c:'',d:'',e:'',f:'',g:'',
    crescent:'不要',
    irissumi:false, nakasan:false,
    carten_idoushi:false, uzuki:false,
    carten_fukami:'',
    kaito_shoji:false,
    caution:'',
    wh_teleko:false,
  });
  currentAW = id;
  renderAWSelector();
  renderSaisun();
}

function delAW() {
  if (!currentAW || awList.length === 0) return;
  if (!confirm(currentAW + ' を削除しますか？')) return;
  awList = awList.filter(w => w.id !== currentAW);
  currentAW = awList.length ? awList[awList.length-1].id : null;
  renderAWSelector();
  renderSaisun();
}

function selectAW(id) {
  currentAW = id;
  renderAWSelector();
  renderSaisun();
}

function renderAWSelector() {
  let sel = document.getElementById('awSelector');
  let btns = awList.map(w =>
    `<button class="aw-btn ${w.id===currentAW?'active':''}" onclick="selectAW('${w.id}')">${w.id}</button>`
  ).join('');
  sel.innerHTML = `<span style="font-weight:bold;font-size:12px;">符号：</span>${btns}
    <button class="add-aw-btn" onclick="addAW()">＋ AW追加</button>
    <button class="del-aw-btn" onclick="delAW()">AW削除</button>`;
}

function setAW(field, val) {
  let w = awList.find(x => x.id === currentAW);
  if (!w) return;
  w[field] = val;
  if (field === 'maker') { w.color = ''; w.glass = ''; }
  // 手配寸法仮計算
  calcHandai(w);
  renderSaisun();
}

function toggleAW(field) {
  let w = awList.find(x => x.id === currentAW);
  if (!w) return;
  w[field] = !w[field];
  renderSaisun();
}

function calcHandai(w) {
  // ※仮ルール - 後で正確なルールに差し替え
  let nums = [w.wu,w.wm,w.wd].filter(v=>v!=='').map(Number);
  let hnums = [w.hl,w.hm,w.hr].filter(v=>v!=='').map(Number);
  if (nums.length) {
    let minW = Math.min(...nums);
    w.handaiW = String(minW - (w.maker==='インプラス'?4:6));
  }
  if (hnums.length) {
    let minH = Math.min(...hnums);
    w.handaiH = String(minH - (w.maker==='インプラス'?5:6));
  }
}

function renderSummary() {
  let bukken = document.getElementById('bukkenName')?.value || '（未入力）';
  let gyY = document.getElementById('genchoY')?.value || '';
  let gyM = document.getElementById('genchoM')?.value || '';
  let gyD = document.getElementById('genchoD')?.value || '';
  let content = document.getElementById('summaryContent');
  if (!awList.length) {
    content.innerHTML = '<div style="text-align:center;padding:2rem;color:#888;">採寸データがありません</div>';
    return;
  }
  let rows = awList.map(w => {
    let nums = [w.wu,w.wm,w.wd].filter(v=>v!=='').map(Number);
    let hnums = [w.hl,w.hm,w.hr].filter(v=>v!=='').map(Number);
    let minW = nums.length ? Math.min(...nums) : '-';
    let minH = hnums.length ? Math.min(...hnums) : '-';
    return `<tr>
      <td style="text-align:center;font-weight:bold;">${w.id}</td>
      <td>${w.maker}</td>
      <td>${w.type}</td>
      <td>${w.color||'-'}</td>
      <td>${w.glass||'-'}</td>
      <td style="text-align:right;">${minW}</td>
      <td style="text-align:right;">${minH}</td>
      <td style="text-align:right;font-weight:bold;color:#1a7a4a;">${w.handaiW||'-'}</td>
      <td style="text-align:right;font-weight:bold;color:#1a7a4a;">${w.handaiH||'-'}</td>
      <td style="font-size:10px;">${w.caution||''}</td>
    </tr>`;
  }).join('');

  let inp = awList.filter(w=>w.maker==='インプラス').length;
  let uch = awList.filter(w=>w.maker==='ウチリモ').length;


  content.innerHTML = `
    <div style="margin-bottom:8px;font-size:12px;">
      <strong>${bukken}</strong>　現調日：${gyY}年${gyM}月${gyD}日
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <div style="border:1px solid #333;padding:4px 10px;text-align:center;">
        <div style="font-size:10px;color:#555;">インプラス</div>
        <div style="font-size:16px;font-weight:bold;">${inp}<span style="font-size:11px;">箇所</span></div>
      </div>
      <div style="border:1px solid #333;padding:4px 10px;text-align:center;">
        <div style="font-size:10px;color:#555;">ウチリモ</div>
        <div style="font-size:16px;font-weight:bold;">${uch}<span style="font-size:11px;">箇所</span></div>
      </div>

      <div style="border:2px solid #333;padding:4px 10px;text-align:center;background:#f0f0f0;">
        <div style="font-size:10px;color:#555;">合計</div>
        <div style="font-size:16px;font-weight:bold;">${awList.length}<span style="font-size:11px;">箇所</span></div>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table class="summary-table">
        <tr>
          <th>符号</th><th>メーカー</th><th>種類</th><th>色</th><th>ガラス</th>
          <th>採寸W</th><th>採寸H</th><th>手配W</th><th>手配H</th><th>注意点</th>
        </tr>
        ${rows}
      </table>
    </div>`;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  const idx = ['omote','saisun','summary'].indexOf(id);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if (id === 'summary') renderSummary();
}

function exportData() {
  alert('集計データをエクスポートします。\n（次フェーズで見積書・工程表連携を実装予定）');
}

addAW();
</script>
